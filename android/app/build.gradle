def localProperties = new File(rootDir, 'local.properties')
def flutterRoot = localProperties.exists() ? localProperties.text.split('\n').find { it.startsWith('flutter.sdk') }?.split('=')?.last()?.strip() : null
def flutterSdk = flutterRoot ? new File(flutterRoot) : null

if (flutterSdk?.isDirectory() == null) {
    throw new GradleException('Flutter SDK not found. Define location with flutter.sdk in the local.properties file.')
}

def flutterVersionCode = localProperties.exists() ? localProperties.text.split('\n').find { it.startsWith('flutter.versionCode') }?.split('=')?.last()?.strip() : null
def flutterVersionName = localProperties.exists() ? localProperties.text.split('\n').find { it.startsWith('flutter.versionName') }?.split('=')?.last()?.strip() : null
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
    compileSdkVersion 34
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.futsal.booking"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source = '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.7.10"
}